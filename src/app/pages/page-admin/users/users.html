<div class="p-1">
    <div class="mb-6 flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">
                Quản lý người dùng
            </h1>
            <p class="mt-1 text-gray-400">
                Danh sách tất cả người dùng trong hệ thống
            </p>
        </div>
    </div>

    <div class="mb-5">
        <app-filter [fields]="filterFields" [initialValues]="filter()" (filterChange)="onFilterChange($event)">
        </app-filter>
    </div>

    <app-table [columns]="columns" [rows]="rows()" [loading]="loading()" [currentPage]="currentPage()"
        [totalPages]="totalPages()" [sortBy]="sortBy()" [asc]="asc()" (sortChange)="onSort($event)"
        (pageChange)="onPageChange($event)" (rowClick)="onRowClick($event)">
    </app-table>
</div>
