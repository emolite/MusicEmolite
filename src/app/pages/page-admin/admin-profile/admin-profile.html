<div class="p-1">
    <div class="mb-6">
        <h1 class="text-3xl text-gray-900 font-bold">
            Thông tin cá nhân
        </h1>

        <p class="mt-1 text-gray-400">
            Quản lý hồ sơ và tài khoản ngân hàng của bạn
        </p>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
        <div class="rounded-2xl bg-white border border-gray-200 shadow-sm overflow-hidden">
            <div class="p-6 flex items-center gap-4 border-b border-gray-100">
                <label class="relative cursor-pointer shrink-0">
                    <img
                        [src]="previewImage() || '/assets/images/default-avatar.png'"
                        class="w-20 h-20 rounded-2xl object-cover border border-gray-200"
                    />

                    <input
                        type="file"
                        class="hidden"
                        accept="image/*"
                        (change)="onSelectImage($event)"
                    />
                </label>

                <div>
                    <h2 class="text-xl font-bold text-gray-900">
                        {{ form().fullName || 'Chưa cập nhật' }}
                    </h2>

                    <p class="text-gray-400">
                        {{ user?.email }}
                    </p>

                    <p class="mt-2 text-sm text-gray-400">
                        Bấm vào ảnh để thay đổi avatar
                    </p>
                </div>
            </div>

            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="text-sm text-gray-600">Họ và tên</label>
                    <input
                        [ngModel]="form().fullName"
                        (ngModelChange)="updateForm('fullName', $event)"
                        class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-gray-900"
                    />
                </div>

                <div>
                    <label class="text-sm text-gray-600">Số điện thoại</label>
                    <input
                        [ngModel]="form().phone"
                        (ngModelChange)="updateForm('phone', $event)"
                        class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-gray-900"
                    />
                </div>

                <div>
                    <label class="text-sm text-gray-600">Ngày sinh</label>
                    <input
                        type="date"
                        [ngModel]="form().dateOfBirth"
                        (ngModelChange)="updateForm('dateOfBirth', $event)"
                        class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-gray-900"
                    />
                </div>

                <div>
                    <label class="text-sm text-gray-600">Giới tính</label>
                    <app-dropdown
                        [options]="genderOptions"
                        [ngModel]="form().gender"
                        (ngModelChange)="updateForm('gender', $event)">
                    </app-dropdown>
                </div>

                <div class="md:col-span-2">
                    <label class="text-sm text-gray-600">Giới thiệu</label>
                    <textarea
                        [ngModel]="form().bio"
                        (ngModelChange)="updateForm('bio', $event)"
                        rows="5"
                        class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-gray-900 resize-none">
                    </textarea>
                </div>
            </div>
        </div>

        <div class="rounded-2xl bg-white border border-gray-200 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-gray-100">
                <h2 class="text-xl font-bold text-gray-900">
                    Tài khoản ngân hàng
                </h2>

                <p class="mt-1 text-sm text-gray-400">
                    Chọn ngân hàng để hệ thống tự tạo mã VietQR
                </p>
            </div>

            <div class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-5">
                <div class="space-y-4">
                    <div>
                        <label class="text-sm text-gray-600">Ngân hàng</label>
                        <app-dropdown
                            [options]="bankOptions()"
                            [ngModel]="bankForm().bankCode"
                            (ngModelChange)="onBankChange($event)">
                        </app-dropdown>
                    </div>

                    <div>
                        <label class="text-sm text-gray-600">Tên ngân hàng</label>
                        <input
                            [ngModel]="bankForm().bankName"
                            readonly
                            class="mt-2 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none text-gray-500"
                        />
                    </div>

                    <div>
                        <label class="text-sm text-gray-600">Số tài khoản</label>
                        <input
                            [ngModel]="bankForm().accountNo"
                            (ngModelChange)="updateBankForm('accountNo', $event)"
                            class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-gray-900"
                        />
                    </div>

                    <div>
                        <label class="text-sm text-gray-600">Tên chủ tài khoản</label>
                        <input
                            [ngModel]="bankForm().accountName"
                            (ngModelChange)="updateBankForm('accountName', $event)"
                            class="mt-2 w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-gray-900"
                        />
                    </div>
                </div>

                <div class="rounded-2xl border border-gray-100 bg-gray-50 p-4 flex flex-col items-center justify-center min-h-[340px]">
                    <ng-container *ngIf="vietQrImageUrl(); else emptyQr">
                        <p class="mb-3 text-sm font-semibold text-gray-700">
                            Mã QR thanh toán
                        </p>

                        <img
                            [src]="vietQrImageUrl()"
                            class="w-60 h-60 object-contain rounded-xl bg-white border border-gray-200"
                        />
                    </ng-container>

                    <ng-template #emptyQr>
                        <div class="text-center text-gray-400">
                            <div class="mx-auto mb-3 flex h-16 w-16 items-center justify-center rounded-2xl bg-white border border-gray-200">
                                QR
                            </div>

                            <p class="text-sm">
                                Chọn ngân hàng và nhập số tài khoản để tạo VietQR
                            </p>
                        </div>
                    </ng-template>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-6 flex justify-end">
        <button
            type="button"
            (click)="saveAll()"
            class="rounded-xl bg-gray-950 px-8 py-3 text-white font-semibold hover:bg-gray-800">
            Lưu thay đổi
        </button>
    </div>
</div>
