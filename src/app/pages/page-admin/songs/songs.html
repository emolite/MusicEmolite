<div class="p-1">
    <div class="mb-6 flex items-center justify-between">
        <div>
            <h1 class="text-3xl text-gray-900 font-bold">
                Quản lý bài hát
            </h1>

            <p class="mt-1 text-gray-400">
                Danh sách tất cả bài hát trong hệ thống
            </p>
        </div>

    </div>

    <app-table [columns]="columns" [rows]="rows()" [loading]="loading()" [currentPage]="currentPage()"
        [totalPages]="totalPages()" emptyText="Không có bài hát nào" (rowClick)="onRowClick($event)"
        (pageChange)="onPageChange($event)">
    </app-table>
</div>
