<div class="min-h-screen w-full flex bg-cover bg-center text-white"
    style="background-image: url('/background-login.jpeg');">
    <div class="absolute inset-0 bg-black/50"></div>
    <div
        class="relative ml-auto w-full max-w-lg h-screen flex items-center bg-black/30 backdrop-blur-xl border-l border-white/10">
        <a href="/users/home"
            class="absolute top-6 left-6 flex items-center gap-2 text-white/60 hover:text-white transition cursor-pointer">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
            </svg>
            <span class="text-sm">Quay lại</span>
        </a>

        <div class="w-full px-14">
            <h1 class="text-4xl font-bold mb-2">Đăng nhập</h1>
            <p class="text-white/60 mb-8 text-base">Chào mừng bạn quay trở lại</p>

            @if(errorMessage()) {
            <div class="mb-5 rounded-xl border border-red-500/20 bg-red-500/10 px-4 py-3 text-sm text-red-300">
                {{ errorMessage() }}
            </div>
            }

            <form class="space-y-4" (ngSubmit)="login()">
                <input type="text" [(ngModel)]="form.userName" (input)="errorMessage.set('')" name="userName"
                    placeholder="Tên đăng nhập"
                    class="w-full px-4 py-4 rounded-xl bg-white/5 border border-white/10 focus:border-violet-500 outline-none text-base placeholder:text-white/30 transition">

                <div class="relative">
                    <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="form.password"
                        (input)="errorMessage.set('')" name="password" placeholder="Mật khẩu"
                        class="w-full px-4 py-4 pr-12 rounded-xl bg-white/5 border border-white/10 focus:border-violet-500 outline-none text-base placeholder:text-white/30 transition">
                    <button type="button" (click)="togglePassword()"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition cursor-pointer">
                        @if (!showPassword()) {
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" />
                        </svg>
                        } @else {
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M2 4l18 18 1.5-1.5-2.3-2.3C21 16 22 12 22 12s-3-7-10-7c-1.6 0-3 .3-4.2.8L3.5 3.5 2 4z" />
                        </svg>
                        }
                    </button>
                </div>

                <button type="submit" [disabled]="loading()"
                    class="w-full py-4 rounded-xl bg-violet-600 hover:bg-violet-500 disabled:opacity-60 disabled:cursor-not-allowed font-semibold text-base transition cursor-pointer flex items-center justify-center gap-3">
                    @if(loading()) {
                    <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
                    </svg>
                    <span>Đang đăng nhập...</span>
                    } @else {
                    <span>Đăng nhập</span>
                    }
                </button>
            </form>

            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-white/40 text-sm">hoặc</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <button type="button" (click)="loginWithGoogle()" [disabled]="loading()"
                class="w-full py-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 disabled:opacity-60 disabled:cursor-not-allowed font-semibold text-base transition cursor-pointer flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Đăng nhập với Google</span>
            </button>

            <p class="text-sm text-center text-white/50 mt-6">
                Chưa có tài khoản?
                <a href="/auth/register" class="text-violet-400 hover:text-violet-300 cursor-pointer">Đăng ký</a>
            </p>
        </div>
    </div>
</div>
