<div class="relative w-full h-full flex flex-col rounded-2xl overflow-hidden border border-gray-200 bg-white">

  <div class="relative flex items-center px-6 pt-5 pb-3 shrink-0">
    <div class="min-w-0">
      <p class="text-xs font-medium tracking-[0.15em] uppercase text-gray-400">Xem trước</p>
      <h2 class="text-lg font-bold text-gray-900 mt-0.5 truncate max-w-[400px]">
        {{ songTitle || 'Bài hát' }}
      </h2>
    </div>
  </div>

  <div class="flex flex-1 overflow-hidden">
    <div class="flex flex-col items-center justify-center px-8 shrink-0 w-64 gap-5">
      <div class="vinyl-wrapper">
        <div class="vinyl-ring">
          <div #vinylImg class="vinyl-img overflow-hidden"
            [style.background]="imgUrl ? 'none' : '#f3f4f6'">
            @if(imgUrl) {
            <img [src]="imgUrl" class="w-full h-full object-cover">
            } @else {
            <div class="w-full h-full flex items-center justify-center">
              <svg class="w-10 h-10 text-gray-300" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
              </svg>
            </div>
            }
          </div>
          <div class="vinyl-center-dot"></div>
        </div>
      </div>

      <div class="text-center space-y-1 px-2">
        <p class="text-gray-900 font-semibold text-sm truncate max-w-[180px]">{{ songTitle }}</p>
        @if(artistName) {
        <p class="text-gray-400 text-xs truncate max-w-[180px]">{{ artistName }}</p>
        }
      </div>
    </div>

    <div class="w-px shrink-0 bg-gray-100"></div>

    <div #lyricsContainer class="lyrics-scroll flex-1 overflow-y-auto px-6">
      <div class="py-[30vh]">
        @for(line of lines; track $index) {
        <div [id]="'pl-' + $index"
          class="lyric-line text-center select-none mb-5 px-2"
          [style.color]="getLineColor($index)"
          [style.opacity]="getLineOpacity($index)">
          {{ line.text }}
        </div>
        }
      </div>
    </div>
  </div>

  <div class="relative px-5 pb-5 pt-4 shrink-0 border-t border-gray-100 bg-white">

    @if(audioUrl) {
    <audio #audioEl [src]="audioUrl" (loadedmetadata)="onAudioLoaded()" class="hidden"></audio>

    <input #seekBar type="range" min="0" [max]="duration" value="0"
      (input)="onSeek($event)" class="seek-bar w-full mb-3 cursor-pointer">

    <div class="flex items-center justify-between">
      <span #timeDisplay class="text-xs tabular-nums text-gray-400">00:00</span>

      <button (click)="togglePlay()"
        class="w-12 h-12 rounded-full flex items-center justify-center cursor-pointer transition-all active:scale-95 bg-gray-900 hover:bg-gray-700">
        @if(isPlaying) {
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
        } @else {
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
        }
      </button>

      <span class="text-xs tabular-nums text-gray-400">{{ formatTime(duration) }}</span>
    </div>
    } @else {
    <p class="text-xs text-center py-2 text-amber-500">Chưa có file nhạc</p>
    }
  </div>

</div>
