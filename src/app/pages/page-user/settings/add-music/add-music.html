<div class="w-full mx-auto space-y-6">
    <div>
        <h1 class="text-3xl font-bold">
            Tạo bài hát
        </h1>
        <p class="text-white/40 text-sm mt-1">
            Phát hành bài hát mới của bạn
        </p>
    </div>
    <div class="space-y-2">
        <label class="text-sm text-white/60">
            Tên bài hát
        </label>
        <input [(ngModel)]="model.title" placeholder="Nhập tên bài hát"
            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white outline-none focus:border-violet-500 transition-all">

    </div>
    <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
            <label class="text-sm text-white/60">
                Ngày phát hành
            </label>
            <input type="date" [(ngModel)]="model.releaseDate"
                class="w-full px-4 py-3 mt-1 rounded-xl bg-white/5 border border-white/10 text-white outline-none focus:border-violet-500 transition-all">
        </div>

        <div class="space-y-2">
            <div class="flex items-center justify-between">
                <label class="text-sm text-white/60">
                    Nghệ sĩ
                </label>
                <button type="button" (click)="openArtistModal()"
                    class="text-sm text-violet-400 hover:text-violet-300 transition-colors cursor-pointer">

                    + Thêm nghệ sĩ
                </button>
            </div>
            <app-dropdown [options]="artistOptions" [searchable]="true" placeholder="Chọn nghệ sĩ"
                searchPlaceholder="Tìm nghệ sĩ..." (changed)="onArtistSelect($event)">
            </app-dropdown>
        </div>
    </div>

    <div class="space-y-2">

        <label class="text-sm text-white/60">
            Album
        </label>

        <app-dropdown [options]="albumOptions" [searchable]="true" placeholder="Chọn album"
            searchPlaceholder="Tìm album..." (changed)="onAlbumSelect($event)">
        </app-dropdown>

    </div>

    <div class="space-y-2">
        <label class="text-sm text-white/60">
            File nhạc
        </label>
        <div class="flex items-center gap-4 bg-white/5 border border-white/10 rounded-2xl p-4">

            <div class="relative w-24 h-24 rounded-2xl overflow-hidden shrink-0">

                @if(imagePreview) {

                <img [src]="imagePreview" class="absolute inset-0 w-full h-full object-cover">

                } @else {

                <div
                    class="w-full h-full bg-gradient-to-br from-violet-900/60 via-purple-800/40 to-black flex items-center justify-center">

                    <svg class="w-10 h-10 text-violet-400/30" fill="currentColor" viewBox="0 0 24 24">

                        <path
                            d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />

                    </svg>

                </div>

                }

            </div>

            <div class="flex-1 min-w-0">

                <p class="text-white font-semibold truncate">
                    {{ model.title || 'Tên bài hát' }}
                </p>

                @if(audioName) {

                <div class="mt-2 flex items-center gap-2">

                    <p class="text-xs text-violet-300 truncate">
                        {{ audioName }}
                    </p>

                    <button type="button" (click)="removeAudio()"
                        class="w-5 h-5 rounded-full bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 flex items-center justify-center transition-all cursor-pointer">

                        <svg class="w-3 h-3 text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />

                        </svg>

                    </button>

                </div>

                } @else {

                <label
                    class="inline-flex mt-2 px-3 py-1.5 rounded-full bg-violet-500/10 hover:bg-violet-500/20 border border-violet-500/20 text-violet-300 text-xs cursor-pointer transition-all">

                    <input type="file" accept="audio/*" (change)="onAudioChange($event)" class="hidden">

                    Chọn file nhạc

                </label>

                }

            </div>

        </div>

    </div>

    <div class="space-y-3">

        <label class="text-sm text-white/60">
            Ảnh bài hát
        </label>

        <label
            class="flex items-center justify-center w-full min-h-[260px] rounded-2xl border border-dashed border-white/10 bg-white/5 hover:bg-white/8 transition-all cursor-pointer overflow-hidden">

            <input type="file" accept="image/*" (change)="onImageChange($event)" class="hidden">

            @if(imagePreview) {

            <img [src]="imagePreview" class="w-full h-[260px] object-cover">

            } @else {

            <div class="text-center">

                <p class="text-white font-medium">
                    Chọn ảnh bài hát
                </p>

                <p class="text-sm text-white/40 mt-1">
                    PNG, JPG, WEBP...
                </p>

            </div>
            }
        </label>

    </div>

    <button (click)="submit()" [disabled]="isSubmitting"
        class="w-full bg-violet-600 hover:bg-violet-500 disabled:opacity-50 disabled:cursor-not-allowed py-3 rounded-xl font-semibold transition-all cursor-pointer">

        @if(isSubmitting) {
        Đang tải lên...
        } @else {
        Tạo bài hát
        }
    </button>
</div>

<app-add-artist [open]="showArtistModal" (closed)="closeArtistModal()" (created)="onArtistCreated($event)">
</app-add-artist>
