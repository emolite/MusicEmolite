<div class="min-h-screen bg-[#0f0d1a] text-white flex">
    <aside class="w-72 border-r border-white/10 p-6">
        <a routerLink="/users/home"
            class="flex items-center gap-2 text-white/40 hover:text-white text-sm mb-6 transition-colors cursor-pointer w-fit">
            <lucide-icon [img]="ArrowLeftIcon" class="w-4 h-4"></lucide-icon>
            Quay lại
        </a>
        <div class="flex items-center gap-3 mb-6">
            <lucide-icon [img]="Setting" class="w-6 h-6 transition-all"></lucide-icon>
            <h2 class="text-2xl font-bold">Cài đặt</h2>
        </div>

        <ul class="space-y-2">
            <li>
                <a routerLink="profile" routerLinkActive="bg-violet-600 text-white"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:bg-white/5 transition-all">
                    <lucide-icon [img]="UserIcon" class="w-4 h-4"></lucide-icon>
                    Thông tin
                </a>
            </li>
            <li>
                <a routerLink="add-music" routerLinkActive="bg-violet-600 text-white"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:bg-white/5 transition-all">
                    <lucide-icon [img]="MusicIcon" class="w-4 h-4"></lucide-icon>
                    Sáng tác
                </a>
            </li>
        </ul>

    </aside>

    <main class="flex-1 p-8">
        <router-outlet></router-outlet>
    </main>
</div>
