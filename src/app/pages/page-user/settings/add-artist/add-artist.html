@if(open) {

<div class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">

  <div class="w-full max-w-md rounded-2xl bg-[#181622] border border-white/10 p-6 space-y-5">

    <div class="flex items-center justify-between">

      <h2 class="text-xl font-bold text-white">
        Thêm nghệ sĩ
      </h2>

      <button
        type="button"
        (click)="close()"
        class="text-white/40 hover:text-white transition-colors cursor-pointer">

        ✕

      </button>

    </div>

    <div class="space-y-2">

      <label class="text-sm text-white/60">
        Tên thật
      </label>

      <input
        [(ngModel)]="model.name"
        placeholder="Nhập tên thật"
        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white outline-none focus:border-violet-500">

    </div>

    <div class="space-y-2">

      <label class="text-sm text-white/60">
        Nghệ danh
      </label>

      <input
        [(ngModel)]="model.stageName"
        placeholder="Nhập nghệ danh"
        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white outline-none focus:border-violet-500">

    </div>

    <div class="space-y-2">

      <label class="text-sm text-white/60">
        Quốc gia
      </label>

      <input
        [(ngModel)]="model.country"
        placeholder="Nhập quốc gia"
        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white outline-none focus:border-violet-500">

    </div>

    <button
      type="button"
      (click)="submit()"
      class="w-full py-3 rounded-xl bg-violet-600 hover:bg-violet-500 font-semibold transition-all cursor-pointer">

      Tạo nghệ sĩ

    </button>

  </div>

</div>

}
