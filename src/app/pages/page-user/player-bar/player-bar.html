@if(player.currentTrack()) {

<footer [class.player-bar-hidden]="player.isPlayerHidden()" [class.player-bar-visible]="!player.isPlayerHidden()" class="fixed bottom-0 left-0 right-0 h-24
         bg-[#130f21]/95 backdrop-blur-2xl
         border-t border-white/5
         z-40 px-6 flex items-center gap-4">

  <button class="absolute -top-10 right-8
           w-14 h-10
           rounded-t-2xl
           bg-[#130f21]/95
           border border-white/10
           border-b-0
           flex items-center justify-center
           text-white/70 hover:text-white
           hover:bg-[#1b1630]
           transition-all duration-300
           shadow-lg shadow-black/30
           cursor-pointer" (click)="player.togglePlayerBar()">

    <svg class="w-5 h-5 transition-all duration-300" [class.rotate-180]="player.isPlayerHidden()" fill="none"
      stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

      <path d="m6 15 6-6 6 6" />
    </svg>
  </button>

  <div class="flex items-center gap-3 w-64 shrink-0">

    <div
      class="w-14 h-14 rounded-xl bg-gradient-to-br from-violet-900/60 to-black shrink-0 flex items-center justify-center border border-white/10 overflow-hidden cursor-pointer group relative"
      (click)="player.openDetail()">

      @if (player.currentTrack()?.imgUrl) {
      <img [src]="player.currentTrack().imgUrl"
        class="w-full rounded-xl h-full object-cover group-hover:scale-105 transition-transform">
      } @else {
      <div class="w-full h-full bg-gradient-to-br from-violet-900/60 to-black flex items-center justify-center">
        <svg class="w-6 h-6 text-violet-400/50" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
        </svg>
      </div>
      }

      <div
        class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
      </div>
    </div>

    <div class="min-w-0 flex-1">
      <p class="text-sm font-semibold text-white truncate">
        {{ player.currentTrack()?.name || 'Chưa phát bài nào' }}
      </p>

      <p class="text-xs text-white/40 truncate">
        {{ player.currentTrack()?.artist || '—' }}
      </p>
    </div>

    <button class="shrink-0 transition-all" [class.text-violet-400]="player.isLiked()"
      [class.text-white]="!player.isLiked()" [class.opacity-40]="!player.currentTrack()"
      [disabled]="!player.currentTrack()" (click)="player.toggleLike()">

      <svg class="w-5 h-5 transition-transform hover:scale-110" [attr.fill]="player.isLiked() ? 'currentColor' : 'none'"
        stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

        <path
          d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
      </svg>
    </button>
  </div>

  <div class="flex-1 flex flex-col items-center gap-2">

    <div class="flex items-center gap-5">

      <button class="text-white/40 hover:text-white transition-colors" [class.text-violet-400]="player.isShuffle()"
        (click)="player.toggleShuffle()">

        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" />
        </svg>
      </button>

      <button class="text-white/40 hover:text-white transition-colors" (click)="player.prevTrack()">

        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
        </svg>
      </button>

      <button
        class="w-10 h-10 bg-violet-600 hover:bg-violet-500 rounded-full flex items-center justify-center shadow-lg shadow-violet-600/30 cursor-pointer transition-all hover:scale-105"
        (click)="player.togglePlay()">

        @if (player.isPlaying()) {
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
        } @else {
        <svg class="w-5 h-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
        }
      </button>

      <button class="text-white/40 hover:text-white transition-colors" (click)="player.nextTrack()">

        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
        </svg>
      </button>

      <button class="hover:text-white transition-colors cursor-pointer" [class.text-violet-400]="player.isRepeat()"
        [class.text-white]="!player.isRepeat()" [class.opacity-40]="!player.isRepeat()" (click)="player.toggleRepeat()">

        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" />
        </svg>
      </button>
    </div>

    <div class="flex items-center gap-3 w-full max-w-lg">
      <span class="text-xs text-white/30 w-8 text-right">
        {{ player.currentTime() }}
      </span>

      <div class="flex-1 h-1 bg-white/10 rounded-full relative cursor-pointer group" (click)="player.seek($event)">

        <div class="h-full bg-violet-500 rounded-full relative" [style.width]="player.progressPercent() + '%'">

          <div
            class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-white rounded-full shadow-md opacity-0 group-hover:opacity-100 transition-opacity">
          </div>
        </div>
      </div>

      <span class="text-xs text-white/30 w-8">
        {{ player.duration() }}
      </span>
    </div>
  </div>

  <div class="flex items-center gap-3 w-48 justify-end shrink-0">

    <button class="text-white/40 hover:text-white transition-colors cursor-pointer" (click)="player.toggleMute()">

      @if (!player.isMuted()) {
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path
          d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
      </svg>
      } @else {
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path
          d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
      </svg>
      }
    </button>

    <div class="flex-1 h-1 bg-white/10 rounded-full cursor-pointer group relative" (click)="player.setVolume($event)"
      (mousedown)="player.startVolumeDrag($event)">

      <div class="h-full bg-white/40 group-hover:bg-violet-400 rounded-full transition-colors relative"
        [style.width]="player.volume() + '%'">

        <div
          class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-white rounded-full shadow-md opacity-0 group-hover:opacity-100 transition-opacity">

          <div
            class="absolute -top-7 left-1/2 -translate-x-1/2 bg-black/80 text-white text-xs px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap pointer-events-none">
            {{ player.volume() }}%
          </div>
        </div>
      </div>
    </div>
  </div>
</footer>
}
