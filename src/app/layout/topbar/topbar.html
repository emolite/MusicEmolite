<header
  class="sticky top-0 z-30 bg-[#0f0d1a]/80 backdrop-blur-xl border-b border-white/5 px-8 py-4 flex items-center justify-between">
  <div class="flex-1 max-w-md mx-8">
    <div class="relative" (click)="$event.stopPropagation()">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30 pointer-events-none z-10"
        fill="currentColor" viewBox="0 0 24 24">
        <path
          d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
      </svg>

      @if (isSearching()) {
      <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-violet-400 animate-spin"
        fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      }

      <!-- Input -->
      <input
        type="text"
        placeholder="Tìm bài hát, nghệ sĩ..."
        [value]="searchQuery()"
        (input)="onSearchInput($event)"
        (keydown)="onSearchKeydown($event)"
        (focus)="suggestions().length > 0 && showDropdown.set(true)"
        class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 text-sm text-white
               placeholder-white/30 focus:outline-none focus:border-violet-500/50 focus:bg-white/8 transition-all" />

      <!-- Suggestions Dropdown -->
      @if (showDropdown() && suggestions().length > 0) {
      <div
        class="absolute top-full left-0 right-0 mt-2 bg-[#1a1825] border border-white/10 rounded-2xl
               shadow-2xl overflow-hidden z-50">
        @for (item of suggestions(); track item.id) {
        <button
          type="button"
          (click)="selectSuggestion(item)"
          class="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-white/5 transition-colors
                 group border-b border-white/5 last:border-0 cursor-pointer">

          <!-- Music note icon -->
          <div class="w-7 h-7 rounded-lg bg-violet-600/20 flex items-center justify-center shrink-0">
            <svg class="w-3.5 h-3.5 text-violet-400" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
          </div>

          <div class="min-w-0 flex-1">
            <p class="text-sm font-medium text-white truncate">{{ item.title }}</p>
            @if (item.artistName) {
            <p class="text-xs text-white/40 truncate">{{ item.artistName }}</p>
            }
          </div>

          <svg class="w-3.5 h-3.5 text-white/20 group-hover:text-violet-400 transition-colors shrink-0"
            fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/>
          </svg>
        </button>
        }

        <button
          type="button"
          (click)="goToPlaylistWithKeyword(searchQuery())"
          class="w-full flex items-center justify-center gap-2 px-4 py-2.5 text-xs text-violet-400
                 hover:bg-violet-600/10 transition-colors cursor-pointer border-t border-white/5">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          Xem tất cả kết quả cho "{{ searchQuery() }}"
        </button>
      </div>
      }
    </div>
  </div>
  <div class="flex items-center gap-2">
    @if(authService.user()) {
    <div class="relative flex items-center gap-2">
      <button
        (click)="toggleMenu(); $event.stopPropagation()"
        class="flex items-center gap-2 text-sm font-semibold bg-white/5 border border-white/10 text-white
               px-5 py-2 rounded-full hover:bg-white/10 transition-all cursor-pointer">
        @if(profileUri) {
        <img [src]="profileUri" class="w-7 h-7 rounded-full object-cover border border-white/10">
        } @else {
        <div class="w-7 h-7 rounded-full bg-violet-600 flex items-center justify-center">
          <lucide-icon [img]="UserIcon" class="w-4 h-4 text-white"></lucide-icon>
        </div>
        }
        {{ displayName }}
        <lucide-icon [img]="ChevronDownIcon" class="w-4 h-4 transition-all"
          [class.rotate-180]="openMenu()"></lucide-icon>
      </button>

      @if(openMenu()) {
      <ul
        (click)="$event.stopPropagation()"
        class="absolute right-0 mt-50 w-56 bg-[#181622] border border-white/10 rounded-2xl shadow-2xl overflow-hidden">
        <li>
          <button (click)="goProfile()"
            class="w-full flex items-center gap-3 px-4 py-3 text-sm text-white hover:bg-white/5 transition-all cursor-pointer">
            <lucide-icon [img]="UserIcon" class="w-4 h-4"></lucide-icon>
            Thông tin
          </button>
        </li>
        <li>
          <button (click)="goProfile()"
            class="w-full flex items-center gap-3 px-4 py-3 text-sm text-white hover:bg-white/5 transition-all cursor-pointer">
            <lucide-icon [img]="SettingsIcon" class="w-4 h-4"></lucide-icon>
            Cài đặt
          </button>
        </li>
        <li class="border-t border-white/5">
          <button (click)="logout()"
            class="w-full flex items-center gap-3 px-4 py-3 text-sm text-red-300 hover:bg-red-500/10 transition-all cursor-pointer">
            <lucide-icon [img]="LogoutIcon" class="w-4 h-4"></lucide-icon>
            Đăng xuất
          </button>
        </li>
      </ul>
      }
    </div>
    } @else {
    <a routerLink="/auth/login" class="text-sm text-white/60 hover:text-white transition-colors">Đăng nhập</a>
    <button (click)="goRegister()"
      class="text-sm font-semibold bg-violet-600 hover:bg-violet-500 text-white px-5 py-2 rounded-full transition-all cursor-pointer">
      Đăng ký
    </button>
    }
  </div>
</header>
