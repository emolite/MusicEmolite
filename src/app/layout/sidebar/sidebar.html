<aside class="hidden md:flex fixed left-0 top-0 h-full w-64 bg-[#130f21] border-r border-white/5 flex-col z-40">
  <div class="px-6 py-8">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-violet-600 flex items-center justify-center shadow-lg shadow-violet-600/30">
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
        </svg>
      </div>
      <div>
        <p class="text-base font-bold tracking-tight leading-none text-white">Song</p>
        <p class="text-xs text-violet-400 font-medium tracking-widest uppercase">with me</p>
      </div>
    </div>
  </div>

  <nav class="px-3 flex-1">
    <p class="text-[10px] text-white/30 uppercase tracking-widest px-3 mb-3">Menu</p>

    <a routerLink="/users/home" routerLinkActive="bg-violet-500/15 text-violet-300"
      class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/50 hover:text-white hover:bg-white/5 mb-1 transition-all duration-200">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
      </svg>
      <span class="text-sm font-medium">Trang chủ</span>
    </a>

    <div class="my-4 border-t border-white/5"></div>

    <p class="text-[10px] text-white/30 uppercase tracking-widest px-3 mb-3">Thư viện</p>

    <a routerLink="/users/playlist" routerLinkActive="bg-violet-500/15 text-violet-300"
      class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/50 hover:text-white hover:bg-white/5 mb-1 transition-all duration-200">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
      </svg>
      <span class="text-sm font-medium">Danh sách nhạc</span>
    </a>

    <a routerLink="/users/album" routerLinkActive="bg-violet-500/15 text-violet-300"
      class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/50 hover:text-white hover:bg-white/5 mb-1 transition-all duration-200">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" />
      </svg>
      <span class="text-sm font-medium">Albums</span>
    </a>
  </nav>

  <div class="px-4 py-5 border-t border-white/5">
    @if (authService.user()) {
    <div class="relative">
      <button (click)="toggleMenu(); $event.stopPropagation()"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/5 cursor-pointer transition-all">
        <div
          class="w-10 h-10 rounded-full bg-gradient-to-br from-violet-500 to-purple-700 flex items-center justify-center text-white text-xs font-bold shrink-0">
          @if(profileUri) {
          <img [src]="profileUri" class="w-10 h-10 rounded-full object-cover border border-white/10">
          } @else {
          <div class="w-10 h-10 rounded-full bg-violet-600 flex items-center justify-center">
            {{ displayName.charAt(0) || 'U' }}
          </div>
          }
        </div>
        <div class="flex-1 min-w-0 text-left">
          <p class="text-sm font-medium text-white truncate">{{ displayName }}</p>
          <p class="text-xs text-white/40 truncate">{{ user()?.userType }}</p>
        </div>
      </button>
    </div>
    }
  </div>
</aside>

<nav
  class="md:hidden fixed bottom-0 left-0 right-0 z-50 h-16 bg-[#130f21]/95 backdrop-blur-xl border-t border-white/10 flex items-center justify-around px-2">
  <a routerLink="/users/home" routerLinkActive="bg-violet-500/15 text-violet-300 rounded-sm"
    class="flex flex-col items-center justify-center gap-1 text-white/50 min-w-0 flex-1">
    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
    </svg>
    <span class="text-[11px] font-medium truncate">Trang chủ</span>
  </a>

  <a routerLink="/users/playlist" routerLinkActive="bg-violet-500/15 text-violet-300 rounded-sm"
    class="flex flex-col items-center justify-center gap-1 text-white/50 min-w-0 flex-1">
    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
    </svg>
    <span class="text-[11px] font-medium truncate">Nhạc</span>
  </a>

  <a routerLink="/users/album" routerLinkActive="bg-violet-500/15 text-violet-300 rounded-sm"
    class="flex flex-col items-center justify-center gap-1 text-white/50 min-w-0 flex-1">
    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" />
    </svg>
    <span class="text-[11px] font-medium truncate">Album</span>
  </a>

  @if (authService.user()) {
  <button (click)="toggleMenu(); $event.stopPropagation()"
    class="flex flex-col items-center justify-center gap-1 text-white/50 min-w-0 flex-1">
    @if(profileUri) {
    <img [src]="profileUri" class="w-6 h-6 rounded-full object-cover border border-white/10">
    } @else {
    <div class="w-6 h-6 rounded-full bg-violet-600 flex items-center justify-center text-[10px] text-white font-bold">
      {{ displayName.charAt(0) || 'U' }}
    </div>
    }
    <span class="text-[11px] font-medium truncate">Tôi</span>
  </button>
  } @else {
  <a routerLink="/auth/login" routerLinkActive="text-violet-400"
    class="flex flex-col items-center justify-center gap-1 text-white/50 min-w-0 flex-1">
    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
    </svg>
    <span class="text-[11px] font-medium truncate">Login</span>
  </a>
  }
</nav>
