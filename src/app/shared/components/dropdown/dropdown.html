<div class="relative w-full" (click)="$event.stopPropagation()">
  <button
    type="button"
    (click)="toggle()"
    [disabled]="disabled"
    class="w-full px-4 py-3 rounded-xl bg-white/5 border text-white outline-none text-left flex items-center justify-between transition-colors cursor-pointer"
    [class.border-violet-500]="isOpen"
    [class.border-white/10]="!isOpen"
    [class.opacity-50]="disabled"
    [class.cursor-not-allowed]="disabled">

    <span [class.text-white/40]="!selectedOption">
      {{ selectedOption?.label || placeholder }}
    </span>

    <svg
      class="w-4 h-4 text-white/40 transition-transform duration-200"
      [class.rotate-180]="isOpen"
      fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  @if (isOpen) {
    <div class="absolute z-50 w-full mt-2 rounded-xl bg-[#1a1825] border border-white/10 shadow-xl overflow-hidden">
      @if (searchable) {
        <div class="p-2 border-b border-white/10">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            (ngModelChange)="onSearch()"
            [placeholder]="searchPlaceholder"
            class="w-full px-3 py-2 rounded-lg bg-white/5 border border-white/10 text-white text-sm outline-none focus:border-violet-500 placeholder:text-white/30"
            (click)="$event.stopPropagation()">
        </div>
      }
      <ul class="max-h-56 overflow-y-auto">
        @if (filteredOptions.length === 0) {
          <li class="px-4 py-3 text-white/30 text-sm text-center">
            Không có kết quả
          </li>
        }

        @for (option of filteredOptions; track option.value) {
          <li
            (click)="select(option)"
            class="px-4 py-3 text-white text-sm transition-colors flex items-center justify-between"
            [class.opacity-40]="option.disabled"
            [class.cursor-not-allowed]="option.disabled"
            [class.cursor-pointer]="!option.disabled"
            [class.bg-violet-600]="option.value === value"
            [class.hover:bg-white/5]="option.value !== value">

            {{ option.label }}

            @if (option.value === value) {
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
            }
          </li>
        }
      </ul>
    </div>
  }

</div>
